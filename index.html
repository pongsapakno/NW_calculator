<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NW Engineering Calculation Tools v5.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f2044 0%,#1a3a6b 50%,#1a56db 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:36px 28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.logo{font-size:48px;text-align:center;margin-bottom:8px}
h1{font-size:20px;font-weight:800;color:#111827;text-align:center;margin-bottom:4px}
.sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:28px}
.version-badge{display:inline-block;background:#eff6ff;color:#1a56db;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:24px;text-align:center;width:100%}
.btn{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:12px;text-decoration:none;margin-bottom:12px;transition:all .15s;border:2px solid transparent}
.btn:last-child{margin-bottom:0}
.btn-full{background:#1a56db;color:#fff}
.btn-full:hover{background:#1e40af;transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,86,219,.4)}
.btn-ess{background:#f0fdf4;color:#065f46;border-color:#6ee7b7}
.btn-ess:hover{background:#dcfce7;transform:translateY(-1px)}
.btn-mob{background:#fef3c7;color:#78350f;border-color:#fcd34d}
.btn-mob:hover{background:#fef9c3;transform:translateY(-1px)}
.btn-icon{font-size:28px;flex-shrink:0}
.btn-text h2{font-size:15px;font-weight:700;margin-bottom:2px}
.btn-text p{font-size:12px;opacity:.75;line-height:1.4}
.divider{border:none;border-top:1px solid #e5e7eb;margin:20px 0}
.footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚙️</div>
  <h1>NW Engineering Calculation Tools</h1>
  <p class="sub">เครื่องมือคำนวณงานวิศวกรรมระบบก๊าซ</p>
  <div class="version-badge">Version 5.1</div>

  <a class="btn btn-full" href="NW_Calculator.html">
    <span class="btn-icon">🖥️</span>
    <div class="btn-text">
      <h2>Full Version</h2>
      <p>17 calculation tabs · Desktop & tablet</p>
    </div>
  </a>

  <a class="btn btn-ess" href="NW_Calc_Essential.html">
    <span class="btn-icon">📋</span>
    <div class="btn-text">
      <h2>Essential Version</h2>
      <p>10 core tabs · Lightweight</p>
    </div>
  </a>

  <a class="btn btn-mob" href="NW_Calc_Mobile.html">
    <span class="btn-icon">📱</span>
    <div class="btn-text">
      <h2>Mobile Version</h2>
      <p>10 tabs · Optimized for smartphone</p>
    </div>
  </a>

  <hr class="divider">
  <p class="footer">NW Engineering · Gas Network Tools · v5.1</p>
</div>
</body>
</html>
